version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: hotel-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d

volumes:

  postgres-data: